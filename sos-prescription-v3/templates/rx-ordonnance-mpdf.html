<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ordonnance — Standard</title>
  <style>
    @page { size: A4; margin: 12mm 12mm 14mm 12mm; }
    html, body { padding: 0; margin: 0; }
    * { box-sizing: border-box; }
    .card, .block, .doctor-block, .patient, .verify-box, .med-table, .sheet, .panel, .rx-card { box-shadow: none !important; filter: none !important; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11pt; line-height: 1.35; color: #0f172a; background: #ffffff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { width: 100%; }
    .muted { color: #64748b; }
    .small { font-size: 9.5pt; }
    .xsmall { font-size: 8.5pt; }
    .right { text-align: right; }
    .header { display: table; width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 0; margin-bottom: 6mm; }
    .header > .cell { display: table-cell; vertical-align: top; }
    .doctor-cell { width: 70%; padding-right: 6mm; }
    .verify-cell { width: 30%; text-align: right; }
    .doc-title { font-size: 13.5pt; font-weight: 800; letter-spacing: 0.2pt; margin: 0 0 2.5mm 0; }
    .badge { display: inline-block; padding: 1.5mm 4mm; border-radius: 99mm; background: #eef2ff; color: #1e3a8a; font-weight: 800; font-size: 8.8pt; letter-spacing: 0.35pt; border: 0.25mm solid #dbeafe; text-transform: uppercase; white-space: nowrap; }
    .badge--muted { background: #f8fafc; color: #475569; border-color: #e2e8f0; }
    .doctor-block { padding: 4mm; border: 0.35mm solid #e5e7eb; border-radius: 3mm; }
    .doctor-name { font-size: 12.5pt; font-weight: 800; line-height: 1.2; margin: 0 0 1.5mm 0; color: #0f172a; }
    .doctor-specialty { font-size: 10.2pt; font-weight: 700; color: #1d4ed8; margin: 0 0 1.5mm 0; }
    .doctor-diploma { font-size: 9pt; color: #475569; margin: 0 0 2.5mm 0; }
    .doctor-meta-grid, .patient-grid { display: block; }
    .kv-row { display: table; width: 100%; table-layout: fixed; border-collapse: collapse; margin: 0 0 1.2mm 0; }
    .kv-label, .kv-value { display: table-cell; vertical-align: top; }
    .kv-label { width: 31%; font-size: 8.8pt; font-weight: 800; color: #334155; text-transform: uppercase; letter-spacing: 0.35pt; padding-right: 2mm; }
    .kv-value { font-size: 9.5pt; color: #0f172a; word-break: break-word; }
    .doctor-rpps-panel { margin-top: 2.8mm; padding-top: 2.8mm; border-top: 0.25mm dashed #cbd5e1; text-align: left; }
    .doctor-rpps-heading { font-size: 8.8pt; font-weight: 800; color: #334155; text-transform: uppercase; letter-spacing: 0.5pt; margin-bottom: 1mm; }
    .doctor-rpps-value { font-size: 10.5pt; font-weight: 700; color: #0f172a; margin-bottom: 1.2mm; }
    .doctor-rpps-barcode { display: block; width: 100%; max-width: 62mm; height: 16mm; object-fit: contain; background: #ffffff; }
    .verify-box { display: inline-block; text-align: center; border: 0.35mm solid #e5e7eb; border-radius: 3mm; padding: 3.5mm 3.5mm 2.5mm 3.5mm; width: 100%; max-width: 60mm; }
    .verify-label { font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6pt; color: #334155; margin-bottom: 2mm; }
    .qr { width: 26mm; height: 26mm; object-fit: contain; display: block; margin: 0 auto 2mm auto; border: 0.25mm solid #e5e7eb; border-radius: 2mm; padding: 1mm; background: #ffffff; }
    .verify-note { font-size: 8pt; color: #64748b; line-height: 1.2; }
    .verify-link { font-size: 8.8pt; color: #1d4ed8; word-break: break-all; }
    .patient { border: 0.35mm solid #e5e7eb; border-radius: 3mm; padding: 4mm; margin-bottom: 6mm; background: #f8fafc; }
    .section-label { font-size: 9pt; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6pt; color: #334155; margin: 0 0 2.5mm 0; }
    .rx { margin-bottom: 6mm; }
    .med-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 0.35mm solid #e5e7eb; border-radius: 3mm; overflow: hidden; }
    .med-table thead { display: table-header-group; background: #eef2ff; }
    .med-table th { text-align: left; font-size: 9pt; text-transform: uppercase; letter-spacing: 0.6pt; padding: 3mm 3mm; color: #1e3a8a; border-bottom: 0.25mm solid #e5e7eb; }
    .med-table td { padding: 3mm 3mm; vertical-align: top; border-bottom: 0.25mm solid #eef2f7; font-size: 10.5pt; }
    .med-table tr { break-inside: avoid; page-break-inside: avoid; }
    .med-table tr:last-child td { border-bottom: none; }
    .col-med { width: 52%; }
    .col-pos { width: 28%; }
    .col-dur { width: 20%; }
    .med-name { font-weight: 800; color: #0f172a; margin: 0 0 1mm 0; }
    .med-meta { font-size: 8.8pt; color: #64748b; line-height: 1.25; }
    .med-posology, .med-duration { white-space: pre-wrap; word-break: break-word; }
    .footer { display: table; width: 100%; table-layout: fixed; border-collapse: collapse; margin-top: 4mm; padding-top: 4mm; border-top: 0.35mm solid #e5e7eb; }
    .footer > .cell { display: table-cell; vertical-align: bottom; }
    .footer-left { width: 65%; padding-right: 6mm; }
    .footer-right { width: 35%; text-align: right; }
    .signature-label { font-size: 9pt; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6pt; color: #334155; margin: 0 0 2mm 0; }
    .signature-wrap { display: inline-block; min-width: 55mm; min-height: 18mm; }
    .signature, .sig-img { width: 55mm; height: 18mm; object-fit: contain; display: inline-block; border: 0.25mm solid #e5e7eb; border-radius: 2mm; padding: 1mm; background: #ffffff; }
    .sig-fallback { width: 55mm; min-height: 18mm; display: inline-flex; align-items: center; justify-content: center; text-align: center; border: 0.25mm dashed #cbd5e1; border-radius: 2mm; padding: 2mm; background: #ffffff; color: #64748b; font-size: 8.8pt; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 9pt; }
    @media print { a { color: inherit; text-decoration: none; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="cell doctor-cell">
        <h1 class="doc-title">Ordonnance</h1>
        <div class="doctor-block">{{DOCTOR_BLOCK}}</div>
      </div>
      <div class="cell verify-cell">
        <div style="margin-bottom:2mm;">{{HEADER_BADGE_HTML}}</div>
        <div class="verify-box">
          <div class="verify-label">Vérification</div>
          <img class="qr" src="{{QR_CODE}}" alt="QR Code de vérification" />
          <div class="verify-note">Scannez ce QR code pour vérifier l’authenticité.</div>
        </div>
      </div>
    </div>
    <div class="patient">
      <div class="section-label">Patient</div>
      {{PATIENT_BLOCK}}
    </div>
    <div class="rx">
      <div class="section-label">Prescription</div>
      <table class="med-table">
        <thead>
          <tr><th class="col-med">Médicament</th><th class="col-pos">Posologie</th><th class="col-dur">Durée</th></tr>
        </thead>
        <tbody>{{MEDICATIONS_LIST}}</tbody>
      </table>
    </div>
    <div class="footer">
      <div class="cell footer-left">{{FOOTER_BLOCK}}</div>
      <div class="cell footer-right">
        <div class="signature-label">Signature</div>
        <div class="signature-wrap">{{SIGNATURE_IMG_HTML}}</div>
      </div>
    </div>
  </div>
</body>
</html>
